<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Just One Question ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff6b9d,#ffc3d6);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}
.card{
    background:#fff;
    padding:30px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}
button{
    padding:12px 25px;
    margin:10px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:18px;
}
#yes{
    background:#ff4d88;
    color:white;
}
#no{
    background:#ddd;
}
h2{
    color:#ff4d88;
}
</style>
</head>

<body>

<div class="card">
    <h2>Can I keep loving you every day? ❤️</h2>

    <button id="yes" onclick="yes()">Yes 💖</button>
    <button id="no" onmouseover="moveNo()">Not Yet 😅</button>

    <p id="text"></p>
</div>

<script>
function yes(){
    document.getElementById("text").innerHTML =
        "You just made me the happiest person alive! ❤️🥹";
}

function moveNo(){
    const btn = document.getElementById("no");

    btn.style.position = "absolute";
    btn.style.left = Math.random() * (window.innerWidth - 120) + "px";
    btn.style.top = Math.random() * (window.innerHeight - 60) + "px";
}

// If she actually clicks "Not Yet"
document.getElementById("no").onclick = function(){
    document.getElementById("text").innerHTML =
        "That's okay ❤️. I respect your feelings, and I'm glad you visited this page.";
};
</script>

</body>
</html>
