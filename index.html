<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 សម្រាប់អូន 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kantumruy Pro',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:380px;
    padding:30px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
    animation:floatCard 3s ease-in-out infinite;
    position:relative;
    z-index:10;
}

@keyframes floatCard{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}

h1{
    font-size:28px;
    margin-bottom:15px;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px white;}
    to{text-shadow:0 0 25px #ffb6d5;}
}

p{
    font-size:16px;
    line-height:1.8;
}

button{
    margin-top:20px;
    padding:12px 24px;
    border:none;
    border-radius:40px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

#yes{
    background:white;
    color:#ff4f81;
    font-weight:bold;
}

#yes:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px white;
}

#no{
    background:#ffffff55;
    color:white;
    position:relative;
}

#msg{
    margin-top:20px;
    font-size:18px;
    min-height:80px;
    transition:.5s;
}

.heart{
    position:absolute;
    color:white;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{transform:translateY(100vh) scale(.5);opacity:1;}
    to{transform:translateY(-100px) scale(1.5);opacity:0;}
}

.actions{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}
</style>
</head>

<body>

<div class="card" id="card">

<h1>💖 សម្រាប់អូន 💖</h1>

<p id="text">
អូន... ❤️<br>
បងមានអ្វីមួយចង់ប្រាប់អូន... 😊
</p>

<div class="actions">
<button id="yes" onclick="yesLove()">💖 Yes</button>
<button id="no" onclick="moveNo()">🙈 Not Yet</button>
</div>

<div id="msg"></div>

</div>

<script>

const messages = [
"សុំទោសផងណា៎ បើថ្ងៃហ្នឹងបងរៀងប្លែកបន្តិច មកពីក្នុងខួរក្បាលបង គិតឃើញតែមុខអូន 🙈",
"ថ្ងៃហ្នឹងមិនដឹងកើតអីទេ មានអារម្មណ៍ថាដូចខ្វះថាមពលម៉េចមិនដឹង ប្រហែលមកពីអត់ទាន់បានឃើញមុខអូនហើយមើលទៅ 🍼🧸",
"ចង់ជួបអូនដែរ តែខ្លាចតែដល់ពេលជួបមែនទែន បងអត់ហ៊ានមើលចំភ្នែកអូន ព្រោះអៀនពេក 🫣គិតម៉េចទៅ?",
"បើបានជួបគ្នា បងសុំលួចកាន់ដៃបន្តិចបានអត់? និយាយមែនណា៎ គ្រាន់តែគិតក៏អៀនខ្លួនឯងដែរ 🥺👉👈",
"ពេលខ្លះចង់តេទៅរកអូនដែរ តែបើឮសំឡេងអូនហើយ មិនដឹងនិយាយអីទេ ព្រោះអៀន 🥺👉👈",
"បងមិនសូវពូកែនិយាយផ្អែមល្ហែមទេ តែបងពូកែអៀន បើបាននៅក្បែរមែនទែន សុំលាក់មុខក្នុងស្មារបស់អូនបានអត់? 🙈"
];

let i = 0;

function typeMessage(){
    if(i < messages.length){
        document.getElementById("msg").innerHTML = messages[i];
        i++;
    }else{
        document.getElementById("msg").innerHTML =
        "💍 អូនចង់ធ្វើជាប្រពន្ធរបស់បងទេ?";
    }
}

setInterval(typeMessage, 2000);

function yesLove(){
    document.body.style.background =
    "linear-gradient(45deg,#ff4f81,#ff99cc,#ffd1dc)";

    document.getElementById("card").innerHTML = `
        <h1>💖 អរគុណអូន!! 💖</h1>
        <p>
        🥹 អរគុណអូនណាស់...<br><br>
        ចាប់ពីថ្ងៃនេះ បងសន្យាថានឹងថែអូន ធ្វើឲ្យអូនញញឹម<br>
        និងស្រឡាញ់អូនជារៀងរហូត ❤️🌹
        </p>
    `;
}

function moveNo(){
    const btn = document.getElementById("no");

    // playful move but still clickable
    btn.style.position = "absolute";
    btn.style.left = Math.random() * (window.innerWidth - 100) + "px";
    btn.style.top = Math.random() * (window.innerHeight - 80) + "px";
}

// floating hearts
setInterval(()=>{
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = ["❤️","💕","💖","💗"][Math.floor(Math.random()*4)];
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (20 + Math.random()*20) + "px";

    document.body.appendChild(heart);

    setTimeout(()=> heart.remove(), 6000);
},200);

</script>

</body>
</html>
