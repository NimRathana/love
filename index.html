<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>សម្រាប់អូន ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kantumruy Pro',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#ff758c,#ff7eb3,#ff9a9e,#fad0c4);
    background-size:400% 400%;
    animation:bg 10s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    width:380px;
    padding:35px;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(15px);
    border-radius:25px;
    text-align:center;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
}

h1{
    font-size:30px;
    margin-bottom:15px;
}

p{
    font-size:18px;
    line-height:1.8;
}

button{
    margin-top:25px;
    padding:13px 28px;
    border:none;
    border-radius:40px;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

#yes{
    background:white;
    color:#ff4f81;
    font-weight:bold;
}

#yes:hover{
    transform:scale(1.08);
}

#no{
    background:#ffffff55;
    color:white;
}

#msg{
    margin-top:25px;
    font-size:20px;
    min-height:90px;
    transition:.5s;
}

.heart{
    position:absolute;
    color:white;
    animation:float 6s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:1;
    }
    to{
        transform:translateY(-100px) scale(1.5);
        opacity:0;
    }
}
</style>

</head>
<body>

<div class="card">

<h1>❤️ សម្រាប់អូន ❤️</h1>

<p>
អូនដឹងទេ...<br><br>
រាល់ថ្ងៃដែលបងបាននិយាយជាមួយអូន<br>
គឺជាថ្ងៃដែលបងមានស្នាមញញឹម។ 😊
</p>

<button id="yes" onclick="love()">ប៉ះទីនេះ 💖</button>
<button id="no" onmouseover="moveNo()">🙈</button>

<div id="msg"></div>

</div>

<script>

const texts=[
"🌸 អូនគួរឲ្យស្រលាញ់ខ្លាំងណាស់។",
"😊 ពេលអូនញញឹម បេះដូងបងញញឹមតាម។",
"❤️ បងតែងតែរីករាយពេលឃើញសារពីអូន។",
"🥺 បងមិនដឹងអនាគតនឹងទៅជាយ៉ាងណាទេ...",
"💖 តែបងចង់ឲ្យអូនដឹងថា...",
"❤️ បងស្រលាញ់អូន ដោយស្មោះ។"
];

let i=0;

function love(){

    if(i<texts.length){
        document.getElementById("msg").innerHTML=texts[i];
        i++;
    }else{
        document.getElementById("msg").innerHTML=
        "🥹 អរគុណដែលចុចរហូតដល់ចប់។ អូនជាមនុស្សពិសេសសម្រាប់បង។ ❤️";
    }

}

function moveNo(){

const btn=document.getElementById("no");

btn.style.position="absolute";
btn.style.left=Math.random()*(window.innerWidth-100)+"px";
btn.style.top=Math.random()*(window.innerHeight-60)+"px";

}

setInterval(()=>{

const heart=document.createElement("div");

heart.className="heart";
heart.innerHTML=["❤️","💕","💖","💗"][Math.floor(Math.random()*4)];

heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},300);

</script>

</body>
</html>
